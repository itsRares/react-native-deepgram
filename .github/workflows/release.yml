name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release type (patch | minor | major) or explicit version'
        required: false
        default: 'patch'

# Required for npm provenance (OIDC) and for release-it to push tags/releases.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build package
        run: yarn prepare

      - name: Release
        run: yarn release ${{ github.event.inputs.version }} --ci
        env:
          # Enables npm publish provenance attestations (requires id-token: write).
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
